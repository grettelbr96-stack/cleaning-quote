<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleaning Pro – Instant Quote</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F0F8FF;
    --dark: #1A2B3C;
    --teal: #1B9ED4;
    --teal-light: #3DB8EE;
    --gold: #F5C518;
    --soft: #D6EFFC;
    --text-muted: #5A7A90;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(145deg, #E8F6FF 0%, #FFF9E6 100%);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -180px; right: -180px;
    width: 480px; height: 480px;
    background: radial-gradient(circle, rgba(27,158,212,0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(245,197,24,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .container { width: 100%; max-width: 520px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 32px; animation: fadeDown 0.6s ease both; }
  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px rgba(245,197,24,0.35);
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 6vw, 38px);
    line-height: 1.15;
    color: var(--dark);
    margin-bottom: 10px;
  }
  .header h1 em { font-style: italic; color: var(--teal); }
  .header p { font-size: 15px; color: var(--text-muted); font-weight: 300; }
  .chat-window {
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(26,26,24,0.10), 0 1px 0 rgba(26,26,24,0.04);
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.2s both;
  }
  .chat-top-bar {
    background: linear-gradient(135deg, #1B9ED4 0%, #0D7BAD 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 40px; height: 40px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .agent-info strong { display: block; color: white; font-size: 14px; font-weight: 600; }
  .agent-info span { font-size: 12px; color: rgba(255,255,255,0.6); }
  .online-dot {
    width: 8px; height: 8px;
    background: #4ADE80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 6px #4ADE80;
    animation: pulse 2s infinite;
  }
  .messages {
    padding: 24px;
    min-height: 280px;
    max-height: 400px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--soft); border-radius: 4px; }
  .msg { display: flex; gap: 10px; animation: msgIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .msg.user .msg-avatar { background: var(--gold); }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
  }
  .msg.bot .bubble { background: var(--cream); border-bottom-left-radius: 4px; color: var(--dark); }
  .msg.user .bubble { background: var(--teal); border-bottom-right-radius: 4px; color: white; }
  .options { padding: 0 24px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--cream);
    border: 1.5px solid var(--soft);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
  }
  .chip:hover { background: var(--teal); border-color: var(--teal); color: white; transform: translateY(-1px); }
  .chip.selected { background: var(--teal); border-color: var(--teal); color: white; }
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--soft);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-area input {
    flex: 1;
    border: 1.5px solid var(--soft);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: var(--teal); }
  .input-area input::placeholder { color: #B0ADA6; }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--teal);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--teal-light); transform: scale(1.05); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .typing-dots {
    background: var(--cream);
    padding: 12px 16px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  .summary-card {
    background: linear-gradient(135deg, #1B9ED4 0%, #0D6E9E 100%);
    color: white;
    border-radius: 14px;
    padding: 18px;
    font-size: 13px;
    line-height: 1.8;
    max-width: 88%;
  }
  .card-title { font-family: 'DM Serif Display', serif; font-size: 17px; margin-bottom: 10px; display: block; }
  .price-row { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }
  .price-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
  .price-value { font-family: 'DM Serif Display', serif; font-size: 26px; color: #FFE066; display: block; margin-top: 2px; }
  .upsell { margin-top: 10px; padding: 8px 12px; background: rgba(255,255,255,0.12); border-radius: 8px; font-size: 12px; line-height: 1.6; }
  .tag { display: inline-block; background: rgba(255,255,255,0.18); border-radius: 10px; padding: 2px 8px; font-size: 11px; margin-right: 4px; margin-top: 4px; }
  .footer-note { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); animation: fadeUp 0.6s ease 0.4s both; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes msgIn { from { opacity: 0; transform: scale(0.92) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">✨ Professional Cleaning</div>
    <h1>Your home,<br><em>spotless</em> in minutes</h1>
    <p>Free quote · No commitment · Instant response</p>
  </div>
  <div class="chat-window">
    <div class="chat-top-bar">
      <div class="avatar">🧹</div>
      <div class="agent-info">
        <strong>Cleaning Assistant</strong>
        <span>Real-time quote</span>
      </div>
      <div class="online-dot"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="options" id="options"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your answer..." autocomplete="off" disabled />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
  <p class="footer-note">🔒 Your info is private and only used for your quote</p>
</div>

<script>
const state = {
  serviceType: null, beds: null, baths: null, frequency: null,
  extras: [], name: '', contact: '', address: '', wantsCall: null,
  currentStep: 'welcome', pendingTextHandler: null
};

const messagesEl = document.getElementById('messages');
const optionsEl = document.getElementById('options');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

sendBtn.onclick = handleSend;
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

function handleSend() {
  const val = inputEl.value.trim();
  if (!val || !state.pendingTextHandler) return;
  inputEl.value = '';
  inputEl.disabled = true;
  addMsg(val, 'user');
  const handler = state.pendingTextHandler;
  state.pendingTextHandler = null;
  handler(val);
}

function scrollBottom() { setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 60); }

function addMsg(text, who) {
  const msg = document.createElement('div');
  msg.className = `msg ${who}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = who === 'bot' ? '🧹' : '😊';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  if (who === 'bot') { msg.appendChild(av); msg.appendChild(bubble); }
  else { msg.appendChild(bubble); msg.appendChild(av); }
  messagesEl.appendChild(msg);
  scrollBottom();
}

function addCard(html) {
  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.innerHTML = `<div class="msg-avatar">🧹</div>${html}`;
  messagesEl.appendChild(msg);
  scrollBottom();
}

function showTyping() {
  removeTyping();
  const t = document.createElement('div');
  t.className = 'msg bot'; t.id = 'typing';
  t.innerHTML = `<div class="msg-avatar">🧹</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(t);
  scrollBottom();
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function clearOptions() { optionsEl.innerHTML = ''; }

function botSay(text, delay = 900) {
  showTyping();
  return new Promise(r => setTimeout(() => { removeTyping(); addMsg(text, 'bot'); r(); }, delay));
}

function askOptions(opts, callback) {
  clearOptions();
  inputEl.disabled = true;
  opts.forEach(opt => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = opt;
    chip.onclick = () => { clearOptions(); addMsg(opt, 'user'); callback(opt); };
    optionsEl.appendChild(chip);
  });
}

function askText(callback) {
  clearOptions();
  inputEl.disabled = false;
  inputEl.value = '';
  inputEl.focus();
  state.pendingTextHandler = callback;
}

function calcPrice() {
  const { serviceType, beds, baths, extras } = state;
  let low = 0, high = 0;
  if (serviceType === 'regular' || serviceType === 'deep') {
    if (beds <= 2 && baths <= 1) { low = 150; high = 200; }
    else if (beds <= 3 && baths <= 2) { low = 200; high = 280; }
    else { low = 280; high = 400; }
  } else if (serviceType === 'moveinout') {
    if (beds <= 2) { low = 150; high = 220; }
    else if (beds <= 3) { low = 220; high = 300; }
    else { low = 300; high = 450; }
  } else if (serviceType === 'postconstruction') {
    if (beds <= 2) { low = 250; high = 400; }
    else if (beds <= 3) { low = 400; high = 800; }
    else { low = 800; high = 1500; }
  }
  extras.forEach(e => {
    if (e === 'oven')     { low += 25; high += 40; }
    if (e === 'fridge')   { low += 25; high += 35; }
    if (e === 'cabinets') { low += 40; high += 80; }
    if (e === 'garage')   { low += 50; high += 120; }
  });
  return { low, high };
}

function regularPrice() {
  const { beds, baths, frequency } = state;
  const small = beds <= 2 && baths <= 1;
  const large = beds >= 4 || baths >= 3;
  if (frequency === 'weekly') {
    if (small) return { low: 90, high: 100 };
    if (!small && !large) return { low: 100, high: 120 };
    return { low: 120, high: 150 };
  }
  if (frequency === 'biweekly') {
    if (small) return { low: 100, high: 120 };
    if (!small && !large) return { low: 120, high: 150 };
    return { low: 140, high: 180 };
  }
  if (small) return { low: 120, high: 140 };
  if (!small && !large) return { low: 150, high: 180 };
  return { low: 180, high: 220 };
}

async function showQuote() {
  showTyping();
  await new Promise(r => setTimeout(r, 1500));
  removeTyping();

  const { low, high } = calcPrice();
  const serviceLabels = { regular:'Regular Cleaning', deep:'Deep Cleaning', moveinout:'Move In / Move Out', postconstruction:'Post-Construction' };
  const freqLabels = { weekly:'Weekly', biweekly:'Every 2 weeks', monthly:'Monthly', onetime:'One time' };
  const extraNames = { oven:'Oven', fridge:'Fridge', cabinets:'Cabinets', garage:'Garage' };
  const extrasHtml = state.extras.length ? state.extras.map(e=>`<span class="tag">+ ${extraNames[e]}</span>`).join('') : '<span class="tag">No add-ons</span>';
  let upsellHtml = '';
  if (state.serviceType === 'regular' && state.frequency && state.frequency !== 'onetime') {
    const r = regularPrice();
    upsellHtml = `<div class="upsell">💡 <strong>After your first visit:</strong> ${freqLabels[state.frequency]} maintenance from <strong>$${r.low}–$${r.high}</strong><br><em style="font-size:11px;opacity:0.85">First cleaning is always a deep clean. Better ongoing rate after.</em></div>`;
  }
  const freqLine = state.frequency ? `<div><strong>Frequency:</strong> ${freqLabels[state.frequency]}</div>` : '';
  const card = `<div class="summary-card"><span class="card-title">🎉 Your quote is ready, ${state.name}!</span><div><strong>Service:</strong> ${serviceLabels[state.serviceType]}</div><div><strong>Size:</strong> ${state.beds} bed · ${state.baths} bath</div>${freqLine}<div><strong>Address:</strong> ${state.address}</div><div style="margin-top:6px">${extrasHtml}</div><div class="price-row"><div class="price-label">Estimated price</div><span class="price-value">$${low} – $${high}</span></div>${upsellHtml}</div>`;
  addCard(card);

  await new Promise(r => setTimeout(r, 700));
  await botSay(`I'll send all the details to: ${state.contact} 📲`, 1000);
  await new Promise(r => setTimeout(r, 400));
  await botSay("Would you like one of our assistants to give you a quick call to go over the details and schedule your cleaning? 😊", 1000);

  await new Promise(resolve => {
    askOptions(["📞 Yes, please call me!", "💬 No thanks, I'll reach out myself"], async (val) => {
      state.wantsCall = val.includes('Yes') ? 'Yes' : 'No';
      if (val.includes('Yes')) {
        await botSay("Perfect! 🎉 We'll give you a call shortly. Keep your phone on! 📞", 700);
      } else {
        await botSay("No problem! Feel free to reach out anytime 😊", 700);
      }
      sendLead(low, high);
      resolve();
    });
  });

  await new Promise(r => setTimeout(r, 500));
  await botSay("Would you like another quote for a different service? 🧹", 800);
  askOptions(["Get another quote", "No thanks, that's all! ✅"], async (val) => {
    if (val.includes('another')) {
      state.serviceType = null; state.beds = null; state.baths = null;
      state.frequency = null; state.extras = []; state.wantsCall = null;
      await botSay("Let's do it! 🚀", 400);
      await askService();
    } else {
      await botSay("Thank you! Have a wonderful day! ✨", 500);
    }
  });
}

async function askExtras() {
  await botSay("Any add-on services? Tap all that apply, then tap Continue ✅");
  await new Promise(resolve => {
    const extraKeys = { oven: false, fridge: false, cabinets: false, garage: false };
    const labels = { oven:"🍳 Oven interior (+$25–40)", fridge:"❄️ Fridge interior (+$25–35)", cabinets:"🗄️ Cabinet interiors (+$40–80)", garage:"🚗 Garage (+$50–120)" };
    clearOptions(); inputEl.disabled = true;
    Object.entries(labels).forEach(([key, label]) => {
      const chip = document.createElement('button');
      chip.className = 'chip'; chip.textContent = label;
      chip.onclick = () => { extraKeys[key] = !extraKeys[key]; chip.classList.toggle('selected', extraKeys[key]); };
      optionsEl.appendChild(chip);
    });
    const cont = document.createElement('button');
    cont.className = 'chip'; cont.textContent = '✅ Continue';
    cont.style.cssText = 'background:#1B9ED4;border-color:#1B9ED4;color:white';
    cont.onclick = () => {
      state.extras = Object.entries(extraKeys).filter(([,v])=>v).map(([k])=>k);
      const selected = state.extras.length ? state.extras.join(', ') : 'No add-ons';
      clearOptions(); addMsg(selected, 'user'); resolve();
    };
    optionsEl.appendChild(cont);
  });
}

async function askService() {
  await botSay("What type of cleaning do you need?");
  await new Promise(resolve => {
    askOptions(["🏠 Regular Cleaning","🧼 Deep Cleaning","📦 Move In / Move Out","🏗️ Post-Construction"], (val) => {
      if (val.includes('Regular')) state.serviceType = 'regular';
      else if (val.includes('Deep')) state.serviceType = 'deep';
      else if (val.includes('Move')) state.serviceType = 'moveinout';
      else state.serviceType = 'postconstruction';
      resolve();
    });
  });

  await botSay("How many bedrooms?");
  await new Promise(resolve => {
    askOptions(["1 bedroom","2 bedrooms","3 bedrooms","4+ bedrooms"], (val) => {
      state.beds = val.startsWith('1') ? 1 : val.startsWith('2') ? 2 : val.startsWith('3') ? 3 : 4;
      resolve();
    });
  });

  await botSay("And how many bathrooms?");
  await new Promise(resolve => {
    askOptions(["1 bathroom","2 bathrooms","3+ bathrooms"], (val) => {
      state.baths = val.startsWith('1') ? 1 : val.startsWith('2') ? 2 : 3;
      resolve();
    });
  });

  if (state.serviceType === 'regular') {
    await botSay("How often would you like the service?");
    await new Promise(resolve => {
      askOptions(["📅 Weekly","📅 Every 2 weeks","📅 Monthly","🗓️ Just this once"], (val) => {
        if (val.includes('Weekly')) state.frequency = 'weekly';
        else if (val.includes('2 weeks')) state.frequency = 'biweekly';
        else if (val.includes('Monthly')) state.frequency = 'monthly';
        else state.frequency = 'onetime';
        resolve();
      });
    });
  }

  await askExtras();

  if (!state.name) {
    await botSay("Almost there! What's your name? 😊");
    await new Promise(resolve => askText(val => { state.name = val; resolve(); }));
    await botSay(`Nice to meet you, ${state.name}! 🙌 What's the best way to reach you? (phone, WhatsApp, or email)`);
    await new Promise(resolve => askText(val => { state.contact = val; resolve(); }));
    await botSay("And what's the address we'd be cleaning? 📍 (City and zip code is fine)");
    await new Promise(resolve => askText(val => { state.address = val; resolve(); }));
  } else {
    await botSay("Same address as before, or a different one? 📍");
    await new Promise(resolve => {
      askOptions(["Same address","Different address"], async (val) => {
        if (val.includes('Different')) {
          await botSay("What's the address? (City and zip is fine)");
          await new Promise(r2 => askText(v => { state.address = v; r2(); }));
        }
        resolve();
      });
    });
  }

  await showQuote();
}

async function run() {
  await new Promise(r => setTimeout(r, 400));
  await botSay("Hi there! 👋 I'm your instant quote assistant. Answer a few quick questions and I'll give you a real price estimate right now. Ready?");
  await new Promise(resolve => {
    askOptions(["Yes, let's do it! 🚀","I have a question first"], async (val) => {
      if (val.includes('question')) {
        await botSay("Of course! Go ahead and type your question 😊");
        await new Promise(r2 => askText(async () => r2()));
      }
      resolve();
    });
  });
  await askService();
}

async function sendLead(low, high) {
  const BOT_TOKEN = '8710645487:AAE6h25pGQXmPy83p2Cg2DQGZAWaz-0a9QM';
  const chatId = '5472292543';
  const freqLabels = { weekly:'Weekly', biweekly:'Every 2 weeks', monthly:'Monthly', onetime:'One time' };
  const serviceLabels = { regular:'Regular Cleaning', deep:'Deep Cleaning', moveinout:'Move In / Move Out', postconstruction:'Post-Construction' };
  const msg =
`🧹 *NEW LEAD!*

👤 *Name:* ${state.name}
📞 *Contact:* ${state.contact}
📍 *Address:* ${state.address}

🏠 *Service:* ${serviceLabels[state.serviceType] || state.serviceType}
🛏 *Size:* ${state.beds} bed / ${state.baths} bath
📅 *Frequency:* ${freqLabels[state.frequency] || 'One time'}
➕ *Extras:* ${state.extras.join(', ') || 'None'}

💰 *Quoted:* $${low} – $${high}
📞 *Wants call:* ${state.wantsCall || 'No'}

🕐 ${new Date().toLocaleString()}`;

  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'Markdown' })
    });
  } catch(e) { console.error('Telegram error:', e); }
}

run();
</script>
</body>
</html>
